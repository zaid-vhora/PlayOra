<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | PlayOra</title>
    <link rel="stylesheet" href="{% static 'sta_user/css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --text-dark: #2D3436;
            --text-light: #636E72;
            --border: #DFE6E9;
            --radius-lg: 20px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #F8FAFC;
            margin: 0;
            padding-top: 80px;
        }

        .profile-wrapper {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .profile-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }

        .profile-sidebar {
            background: white;
            padding: 40px 30px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            text-align: center;
            height: fit-content;
        }

        .profile-img-wrap {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 20px;
            border: 4px solid #FFF;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .profile-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-main {
            background: white;
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #F1F1F1;
            padding-bottom: 15px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-dark);
        }

        .edit-form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full {
            grid-column: span 2;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .form-control {
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            transition: 0.3s;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.1);
        }

        .btn-save {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
        }

        .btn-cancel {
            background: #F1F1F1;
            color: var(--text-dark);
            text-decoration: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-weight: 800;
            display: inline-block;
            margin-left: 10px;
        }

        @media (max-width: 900px) {
            .profile-container { grid-template-columns: 1fr; }
            .edit-form-grid { grid-template-columns: 1fr; }
            .form-group.full { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <div id="header-inject"></div>

    <div class="profile-wrapper">
        <div class="profile-container">
            <aside class="profile-sidebar">
                <div class="profile-img-wrap">
                    {% if user.profile_image %}
                    <img src="{{ user.profile_image.url }}" alt="Profile Image">
                    {% else %}
                    <img src="https://ui-avatars.com/api/?name={{ user.username }}&background=FF6B35&color=fff&size=200" alt="Avatar">
                    {% endif %}
                </div>
                <h2 style="font-size: 24px; font-weight: 800; color: var(--text-dark);">{{ user.first_name }} {{ user.last_name }}</h2>
                <span style="color: var(--primary); font-weight: 600; text-transform: uppercase; font-size: 14px;">Edit Your Profile</span>
                
                <p style="font-size: 14px; color: var(--text-light); margin-top: 20px;">
                    Update your personal details to keep your account up to date.
                </p>
            </aside>

            <main class="profile-main">
                <div class="section-header">
                    <h3 class="section-title">Edit Profile Information</h3>
                </div>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="edit-form-grid">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" name="first_name" class="form-control" value="{{ form.first_name.value|default:'' }}" placeholder="Enter first name">
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" name="last_name" class="form-control" value="{{ form.last_name.value|default:'' }}" placeholder="Enter last name">
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" name="email" class="form-control" value="{{ form.email.value|default:'' }}" placeholder="Email address">
                        </div>
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="text" name="phone" class="form-control" value="{{ form.phone.value|default:'' }}" placeholder="Phone number">
                        </div>
                        <div class="form-group">
                            <label>Date of Birth</label>
                            <input type="date" name="date_of_birth" class="form-control" value="{{ form.date_of_birth.value|date:'Y-m-d'|default:'' }}">
                        </div>
                        <div class="form-group">
                            <label>Gender</label>
                            <select name="gender" class="form-control">
                                <option value="Male" {% if form.gender.value == 'Male' %}selected{% endif %}>Male</option>
                                <option value="Female" {% if form.gender.value == 'Female' %}selected{% endif %}>Female</option>
                                <option value="Other" {% if form.gender.value == 'Other' %}selected{% endif %}>Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" name="city" class="form-control" value="{{ form.city.value|default:'' }}" placeholder="Enter city">
                        </div>
                        <div class="form-group">
                            <label>Pincode</label>
                            <input type="text" name="pincode" class="form-control" value="{{ form.pincode.value|default:'' }}" placeholder="Pincode">
                        </div>
                        <div class="form-group full">
                            <label>Home Address</label>
                            <textarea name="address" class="form-control" rows="3" placeholder="Full address">{{ form.address.value|default:'' }}</textarea>
                        </div>
                        <div class="form-group full">
                            <label>Profile Image</label>
                            <input type="file" name="profile_image" class="form-control">
                        </div>
                    </div>

                    <div style="margin-top: 30px;">
                        <button type="submit" class="btn-save">Save Changes</button>
                        <a href="{% url 'profile_view' %}" class="btn-cancel">Cancel</a>
                    </div>
                </form>
            </main>
        </div>
    </div>

    <div id="footer-inject"></div>

    <script src="{% static 'sta_user/js/components.js' %}"></script>
    <script src="{% static 'sta_user/js/main.js' %}"></script>
</body>
</html>
