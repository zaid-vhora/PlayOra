{% extends 'tmp_admin/master.html' %}
{% load static %}
{% block content %}


        <div class="main-panel">
          <div class="content-wrapper">
            <div class="page-header">
              <h3 class="page-title">Toy list</h3>
              <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                  <li class="breadcrumb-item"><a href="#">Tables</a></li>
                  <li class="breadcrumb-item active" aria-current="page"> Toy list </li>
                </ol>
              </nav>
            </div>
            <div class="row">
              <div class="col-lg-12 grid-margin stretch-card">
                <div class="card">
                  <div class="card-body">
                    <h4 class="card-title">Toy Table</h4>
                    <p class="card-description"> list of  <code> TOYimage </code>
                    </p>
                    <div class="table-responsive" style="display: block !important;">
                      <table class="table">
                        <thead>
                          <tr style="overflow-x: scroll;">
                            <th>toy</th>
                            <th>Image</th>
                            <th>Uploaded_at</th>
                          </tr>
                        </thead>
                        <tbody>
                          {% for i in toyi %}
                          <tr>
                            <th>{{forloop.counter}}</th>
                            <td>{{i.toy.name}}</td>
                            
                            <td><img src="{{i.image.url}}" height="20px" width="200px"></td>
                            <td>{{i.uploaded_at}}</td>
                          </tr>
                          {% endfor %}
                          
                          
                          
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
            </div>  
          </div>
        </div>    

{% endblock %}
