{% extends 'tmp_admin/master.html' %}
{% load static %}
{% block content %}  
    {% comment %}  {% endcomment %}
      
        <div class="main-panel">
          <div class="content-wrapper">
            <div class="page-header">
              <h3 class="page-title">Form elements</h3>
              <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                  <li class="breadcrumb-item"><a href="#"  >Forms</a></li>
                  <li class="breadcrumb-item active" aria-current="page"> Form elements </li>
                </ol>
              </nav>
            </div>
              <form method="post" enctype="multipart/form-data">
              {%csrf_token%}              
              <div class="col-md-12 grid-margin stretch-card">
                <div class="card">
                  <div class="card-body">
                    <h4 class="card-title">Toy damage report</h4>
                    <p class="card-description"> form</p>
                    <form class="forms-sample">
                    {{ form.errors }}
                   
                      {% comment %} <div class="form-group row">
                        <label for="Inputnumber" class="col-sm-3 col-form-label">Id</label>
                        <div class="col-sm-10">
                          <input type="text" name="id" class="form-control" />
                        </div>
                      </div> {% endcomment %}
                      <div class="form-group row">
                        <label for="Inputtext" class="col-sm-3 col-form-label">Toys</label>
                        <div class="col-sm-9">
                          <select class="form-select" name="toys" id="floatingSelect" aria-label="Floating label select example">
                              <option>Open this select menu</option>
                              {% for t in toys %}
                              <option value="{{t.id}}" {% if t.id == damagereport.toys.id %}selected{% endif %}>{{t.name}}</option>
                              {% endfor %}
                          </select>
                        </div>
                      </div>
                      <div class="form-group row">
                        <label for="Inputtext" class="col-sm-3 col-form-label">Description</label>
                        <div class="col-sm-9">
                          <input type="text" name="description" class="form-control" id="exampleInputtext" placeholder="deccription...." value="{{ damagereport.description }}" required>
                        </div>  
                      </div>
                      <div class="form-group row">
                        <label for="Inputnumber" class="col-sm-3 col-form-label">fine_amount</label>
                        <div class="col-sm-9">
                          <input type="number" name="fine_amount" class="form-control" id="exampleInputtext" placeholder="fine amount" value="{{ damagereport.fine_amount }}" required>
                        </div>
                      </div>
                     
                      
                      
                        <div class="form-group row">
                        <label for="Inputdate" class="col-sm-3 col-form-label">resolved</label>
                        <div class="col-sm-9">
                          <input type="date" name="resolved" class="form-control" id="exampleInputtext" placeholder="resolved at" value="{{ damagereport.resolved|date:'Y-m-d' }}" required>
                        </div>
                      </div>
                      <div class="form-group row">
                        <label for="Inputdate" class="col-sm-3 col-form-label">reportedss_at</label>
                        <div class="col-sm-9">
                          <input type="text" class="form-control" value="{{ damagereport.reportedss_at|date:'Y-m-d H:i' }}" readonly />
                        </div>
                      </div>
                      
                     
                     <button type="submit" class="btn btn-primary mr-2" > Submit </button>
                      <button class="btn btn-light">Cancel</button>
                    </form>
                  </div>
                </div>
              </div>
              
          {% comment %}  {% endcomment %}
          {% endblock %}
