<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration | PlayOra</title>
    <link rel="stylesheet" href="{% static 'sta_user/css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --primary-dark: #E85A2A;
            --secondary: #4ECDC4;
            --text-dark: #2D3436;
            --text-light: #636E72;
            --bg-glass: rgba(255, 255, 255, 0.95);
            --border: #DFE6E9;
            --shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            --radius: 20px;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #F9F9F9 0%, #E6EFFF 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
            margin: 0;
            overflow-x: hidden;
        }

        .auth-container {
            width: 100%;
            max-width: 650px;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: var(--shadow);
            border: 1px solid white;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--text-light);
            font-size: 15px;
        }
        
        .badge {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(255, 107, 53, 0.1);
            color: var(--primary);
            border-radius: 50px;
            font-size: 11px;
            font-weight: 800;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .messages {
            margin-bottom: 20px;
            list-style: none;
            padding: 0;
        }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .message.success { background: #E1F8F1; color: #1E7E62; border: 1px solid #B7E9D9; }
        .message.error { background: #FFEBEE; color: #C62828; border: 1px solid #FFCDD2; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 20px;
        }

        .form-group {
            margin-bottom: 5px;
        }
        
        .full-width {
            grid-column: span 2;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s;
            box-sizing: border-box;
            background: #FAFAFA;
        }

        .form-textarea {
            height: 80px;
            resize: none;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.1);
        }

        .btn-auth {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            box-shadow: 0 6px 15px rgba(255, 107, 53, 0.2);
        }

        .btn-auth:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
        }

        .auth-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            color: var(--text-light);
            border-top: 1px solid #F1F1F1;
            padding-top: 20px;
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="badge">Join as User</div>
            <h1>Create Account</h1>
            <p>Start your toy rental journey today!</p>
        </div>

        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li class="message {{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="first_name">First Name</label>
                    <input class="form-input" type="text" id="first_name" name="first_name" placeholder="John" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="last_name">Last Name</label>
                    <input class="form-input" type="text" id="last_name" name="last_name" placeholder="Doe" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-input" type="text" id="username" name="username" placeholder="jdoe88" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input class="form-input" type="email" id="email" name="email" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">Phone Number</label>
                    <input class="form-input" type="tel" id="phone" name="phone" placeholder="+91 00000 00000" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="date_of_birth">Date of Birth</label>
                    <input class="form-input" type="date" id="date_of_birth" name="date_of_birth" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="gender">Gender</label>
                    <select class="form-select" id="gender" name="gender" required>
                        <option value="" disabled selected>Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="city">City</label>
                    <input class="form-input" type="text" id="city" name="city" placeholder="e.g. Modasa" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="pincode">Pincode</label>
                    <input class="form-input" type="text" id="pincode" name="pincode" placeholder="383315" required>
                </div>
                <div class="form-group">
                    <!-- Placeholder or another field -->
                </div>

                <div class="form-group full-width">
                    <label class="form-label" for="address">Full Address</label>
                    <textarea class="form-textarea" id="address" name="address" placeholder="Room no, Building, Street..." required></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirm_password">Confirm Password</label>
                    <input class="form-input" type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-auth">Register Now</button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="{% url 'login' %}">Log In</a></p>
        </div>
    </div>
</body>
</html>
